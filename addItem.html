<!DOCTYPE html>
<html>

<head>
    <title>Add Item - RIKO Parts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            z-index: 1000;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            margin-top: 8vh;
            padding: 20px;
        }

        .form-container {
            max-width: 600px;
            margin: auto;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #EB1E26;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #d01720;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="itemList.html">Item List</a>
        <a href="addItem.html">Add Item</a>
    </div>

    <div class="content">
        <div class="form-container">
            <h2>Add New Item</h2>
            <div class="form-group">
                <label for="newCategory">Add New Category</label>
                <input type="text" id="newCategory" placeholder="Enter new category name">
                <button onclick="addCategory()">Add Category</button>
            </div>

            <div class="form-group">
                <label for="category">Select Category</label>
                <select id="category">
                    <!-- Categories will be populated here -->
                </select>
            </div>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="Enter item name">
            </div>

            <div class="form-group">
                <label for="itemRack">Rack</label>
                <input type="text" id="itemRack" placeholder="Enter rack location">
            </div>

            <div class="form-group">
                <label for="itemNumber">Item Number</label>
                <input type="text" id="itemNumber" placeholder="Enter item number">
            </div>

            <div class="form-group">
                <label for="itemQty">Quantity</label>
                <input type="number" id="itemQty" placeholder="Enter quantity">
            </div>

            <button onclick="addItem()">Add Item</button>
        </div>
    </div>

    <script>
        const categories = JSON.parse(localStorage.getItem('categories')) || [];
        const items = JSON.parse(localStorage.getItem('items')) || [];

        function addCategory() {
            const newCategory = document.getElementById('newCategory').value.trim();
            if (newCategory && !categories.includes(newCategory)) {
                categories.push(newCategory);
                localStorage.setItem('categories', JSON.stringify(categories));
                updateCategoryDropdown();
                document.getElementById('newCategory').value = '';
                alert('Category added!');
            } else {
                alert('Category already exists or is empty!');
            }
        }

        function updateCategoryDropdown() {
            const categoryDropdown = document.getElementById('category');
            categoryDropdown.innerHTML = '';
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryDropdown.appendChild(option);
            });
        }

        function addItem() {
            const itemName = document.getElementById('itemName').value.trim();
            const category = document.getElementById('category').value;
            const itemRack = document.getElementById('itemRack').value.trim();
            const itemNumber = document.getElementById('itemNumber').value.trim();
            const itemQty = parseInt(document.getElementById('itemQty').value.trim());

            if (itemName && category && itemRack && itemNumber && itemQty) {
                const newItem = {
                    name: itemName,
                    category: category,
                    rack: itemRack,
                    number: itemNumber,
                    qty: itemQty
                };
                items.push(newItem);
                localStorage.setItem('items', JSON.stringify(items));
                alert('Item added!');
                resetForm();
            } else {
                alert('Please fill in all fields!');
            }
        }

        function resetForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemRack').value = '';
            document.getElementById('itemNumber').value = '';
            document.getElementById('itemQty').value = '';
        }

        // Initialize dropdown on page load
        document.addEventListener('DOMContentLoaded', updateCategoryDropdown);
    </script>
</body>

</html>
