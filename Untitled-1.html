<!DOCTYPE html>
<html>

<head>
    <title>Styled List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; /* Remove default margin */
        }

        /* Style the navigation bar */
        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed; /* Make it stick/fixed */
            top: 0; /* Stay on top */
            width: 100%; /* Full width */
            height: 7%;
            z-index: 1000; /* Make sure it stays on top of other content */
        }

        /* Navigation links */
        .navbar a {
            float: right;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        /* Change color on hover */
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        ul.custom-list {
            list-style-type: square;
            /* Change bullet type */
            padding-left: 20px;
            /* Indentation */
        }

        ul.custom-list li {
            margin-bottom: 5px;
            /* Space between items */
        }

        .content {
            padding: 80px 20px; /* Add padding to avoid content being hidden behind the navbar */
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>

    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a simple top navigation bar example.</p>

        <h2>Styled List Example</h2>
        <ul class="custom-list">
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </div>
</body>

</html>
