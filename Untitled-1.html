<!DOCTYPE html>
<html>

<head>
    <title>Styled List with Detailed Content</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; /* Remove default margin */
        }

        /* Style the navigation bar */
        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed; /* Make it stick/fixed */
            top: 0; /* Stay on top */
            width: 100%; /* Full width */
            height: 7vh;
            z-index: 1000; /* Make sure it stays on top of other content */
        }

        /* Navigation links */
        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        /* Change color on hover */
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        /* Styled list */
        .custom-list {
            list-style: none; /* Remove default list style */
            padding: 0;
            margin-top: 20px;
        }

        .custom-list li {
            display: table;
            width: 100%;
            background-color: #f2f2f2;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            cursor: pointer; /* Change cursor to pointer to indicate clickable */
        }

        .custom-list li:hover {
            background-color: #e0e0e0;
        }

        /* Detailed content */
        .detailed-content {
            display: none;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #EB1E26;
            margin-top: 5px;
        }

        .custom-list li.active .detailed-content {
            display: block;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>

    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is a simple top navigation bar example.</p>

        <h2>Styled List Example with Detailed Content</h2>
        <ul class="custom-list">
            <li onclick="toggleDetails(this)">As Kick Stater
                <div class="detailed-content">
                    <p>As Kick Stater Beat</p>
                    <p>As Kick Stater Mio</p>
                </div>
            </li>
            <li onclick="toggleDetails(this)">As Pully</li>
            <li onclick="toggleDetails(this)">Botol Klep</li>
        </ul>
    </div>

    <script>
        function toggleDetails(item) {
            var details = item.querySelector('.detailed-content');
            item.classList.toggle('active');
        }
    </script>
</body>

</html>
