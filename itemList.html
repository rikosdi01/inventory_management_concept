<!DOCTYPE html>
<html>

<head>
    <title>RIKO Parts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            overflow: hidden;
            background-color: #EB1E26;
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            z-index: 1000;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 25px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            margin-top: 8vh;
            padding: 20px;
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .custom-list {
            list-style: none;
            padding: 0;
        }

        .custom-list li {
            display: table;
            width: 100%;
            background-color: #f2f2f2;
            border-bottom: 1px solid #ddd;
            padding: 10px;
            cursor: pointer;
            position: relative;
        }

        .custom-list li:hover {
            background-color: #e0e0e0;
        }

        .detailed-content {
            display: none;
            padding: 10px;
            background-color: #f9f9f9;
            border-left: 3px solid #EB1E26;
            margin-top: 5px;
        }

        .custom-list li.active .detailed-content {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .item-filter {
            margin-bottom: 10px;
        }

        .item-filter input {
            width: 95%;
            padding: 5px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .button-cell {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .button-cell button {
            padding: 5px 10px;
            background-color: #EB1E26;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-cell button:hover {
            background-color: #d01720;
        }

        .button-cell .cancel-button {
            background-color: #ccc;
            color: black;
            cursor: not-allowed;
        }

        .button-cell .cancel-button.active {
            background-color: #EB1E26;
            color: white;
            cursor: pointer;
        }

        .button-cell .cancel-button.active:hover {
            background-color: #d01720;
        }

        .copy-button {
            display: none;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
        }

        .copy-button.active {
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="itemList.html">Item List</a>
        <a href="addItem.html">Add Item</a>
    </div>

    <div class="content">
        <div class="search-bar">
            <input type="text" id="searchInput" onkeyup="filterList()" placeholder="Search for items...">
        </div>

        <ul class="custom-list" id="itemList">
            <!-- Categories and items will be populated here -->
        </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadItems);

        function loadItems() {
            const categories = JSON.parse(localStorage.getItem('categories')) || [];
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const ul = document.getElementById('itemList');
            ul.innerHTML = '';

            categories.forEach(category => {
                const li = document.createElement('li');
                li.innerHTML = `<div onclick="toggleDetails(this.parentElement)">${category}</div>
                    <div class="detailed-content">
                        <div class="item-filter">
                            <input type="text" onkeyup="filterTable(this)" placeholder="Search within table...">
                        </div>
                        <table>
                            <tr>
                                <th>Item</th>
                                <th>Rak</th>
                                <th>No.Ktk</th>
                                <th>Qty</th>
                                <th>Action</th>
                            </tr>
                            ${items.filter(item => item.category === category).map(item => `
                            <tr>
                                <td onclick="event.stopPropagation()">${item.name}</td>
                                <td>${item.rack}</td>
                                <td>${item.number}</td>
                                <td>${item.qty}</td>
                                <td class="button-cell">
                                    <button onclick="markDate(this)">Ambil</button>
                                    <button class="cancel-button" onclick="cancelDate(this)" disabled>Batal</button>
                                    <button class="copy-button" onclick="copyToClipboard(this)">Copy</button>
                                </td>
                            </tr>`).join('')}
                        </table>
                    </div>`;
                ul.appendChild(li);
            });
        }

        function toggleDetails(item) {
            item.classList.toggle('active');
        }

        function filterList() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const ul = document.getElementById('itemList');
            const li = ul.getElementsByTagName('li');

            for (let i = 0; i < li.length; i++) {
                const text = li[i].innerText || li[i].textContent;
                if (text.toLowerCase().includes(filter)) {
                    li[i].style.display = "";
                } else {
                    li[i].style.display = "none";
                }
            }
        }

        function filterTable(input) {
            const filter = input.value.toLowerCase();
            const table = input.parentElement.nextElementSibling;
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const cells = tr[i].getElementsByTagName('td');
                let visible = false;
                for (let j = 0; j < cells.length; j++) {
                    const text = cells[j].innerText || cells[j].textContent;
                    if (text.toLowerCase().includes(filter)) {
                        visible = true;
                        break;
                    }
                }
                tr[i].style.display = visible ? "" : "none";
            }
        }

        function markDate(button) {
            const date = new Date().toLocaleDateString();
            const cancelButton = button.nextElementSibling;
            const copyButton = cancelButton.nextElementSibling;
            button.innerHTML = date;
            button.disabled = true;
            cancelButton.classList.add('active');
            cancelButton.disabled = false;
            copyButton.classList.add('active');
        }

        function cancelDate(cancelButton) {
            const actionCell = cancelButton.parentElement;
            const ambilButton = actionCell.querySelector('button:first-child');
            const copyButton = actionCell.querySelector('.copy-button');
            ambilButton.innerHTML = "Ambil";
            ambilButton.disabled = false;
            cancelButton.classList.remove('active');
            cancelButton.disabled = true;
            copyButton.classList.remove('active');
        }

        function copyToClipboard(button) {
            const row = button.parentElement.parentElement;
            const cells = row.getElementsByTagName('td');
            let textToCopy = '';
            for (let i = 0; i < cells.length - 1; i++) {
                textToCopy += cells[i].innerText + '\t';
            }
            navigator.clipboard.writeText(textToCopy.trim())
                .then(() => alert('Copied to clipboard!'))
                .catch(err => console.error('Error copying text: ', err));
        }
    </script>
</body>

</html>
